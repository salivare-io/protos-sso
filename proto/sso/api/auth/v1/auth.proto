syntax = "proto3";

package sso.api.auth.v1;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/salivare-io/protos-sso/gen/go/sso/api/auth/v1;apiauthv1";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Frontend Auth API"
    version: "1.0"
    description: "API for frontend. Backend routes requests to SSO and returns tokens, profiles, and permissions."
  }

  schemes: HTTPS
  consumes: "application/json"
  produces: "application/json"

  security_definitions: {
    security: {
      key: "BearerAuth"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "Authorization"
        description: "Bearer <access_token>"
      }
    }
  }
};

service AuthApiService {
  rpc ExchangeCode(ExchangeCodeRequest) returns (ExchangeCodeResponse) {
    option (google.api.http) = {
      post: "/v1/api/auth/exchange"
      body: "*"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Exchange OAuth2 code to access/refresh token"
      description: "Backend triggers SSO.AuthService.ExchangeCode"
      tags: "Auth API"
    };
  }

  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse) {
    option (google.api.http) = {
      post: "/v1/api/auth/refresh"
      body: "*"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Updating Tokens"
      description: "Backend triggers SSO.AuthService.RefreshToken"
      tags: "Auth API"
    };
  }

  rpc Logout(LogoutRequest) returns (LogoutResponse) {
    option (google.api.http) = {
      post: "/v1/api/auth/logout"
      body: "*"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "User logout"
      description: "Backend triggers SSO.AuthService.Logout"
      tags: "Auth API"
    };
  }

  rpc RevokeRefreshToken(RevokeRefreshTokenRequest) returns (RevokeRefreshTokenResponse) {
    option (google.api.http) = {
      post: "/v1/api/auth/revoke"
      body: "*"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Forced Token Refresh Disability"
      description: "Backend triggers SSO.AuthService.RevokeRefreshToken"
      tags: "Auth API"
    };
  }

  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse) {
    option (google.api.http) = { get: "/v1/api/auth/profile" };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get user profile"
      description: "Backend validates token via SSO and returns profile"
      tags: "Auth API"
      security: { security_requirement: { key: "BearerAuth" } }
    };
  }

  rpc GetPermissions(GetPermissionsRequest) returns (GetPermissionsResponse) {
    option (google.api.http) = { get: "/v1/api/auth/permissions" };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get a list permissions"
      description: "Backend triggers SSO.AuthService.GetPermissions"
      tags: "Auth API"
      security: { security_requirement: { key: "BearerAuth" } }
    };
  }
}

message ExchangeCodeRequest {
  string provider = 1;
  string code = 2;
}

message ExchangeCodeResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {}

message RevokeRefreshTokenRequest {
  string refresh_token = 1;
}

message RevokeRefreshTokenResponse {}

message GetProfileRequest {}

message GetProfileResponse {
  int64 user_id = 1;
  string email = 2;
  string name = 3;
}

message GetPermissionsRequest {}

message Permission {
  string code = 1;
  string description = 2;
}

message GetPermissionsResponse {
  repeated Permission permissions = 1;
}
