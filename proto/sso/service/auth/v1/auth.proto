syntax = "proto3";

package sso.service.auth.v1;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/salivare-io/protos-sso/gen/go/sso/service/auth/v1;authservicev1";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "SSO Auth API"
    version: "1.0"
    description: "OAuth2 authorization, code sharing, token updates, profile retrieval"
  }

  schemes: HTTPS
  consumes: "application/json"
  produces: "application/json"

  // Security scheme for Authorization: Bearer <token>
  security_definitions: {
    security: {
      key: "BearerAuth"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "Authorization"
        description: "Bearer <access_token>"
      }
    }
  }
};

enum Provider {
  PROVIDER_UNSPECIFIED = 0;
  PROVIDER_GOOGLE = 1;
  PROVIDER_YANDEX = 2;
}

service AuthService {
  rpc ExchangeCode(ExchangeCodeRequest) returns (ExchangeCodeResponse) {
    option (google.api.http) = {
      post: "/v1/auth/exchange"
      body: "*"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Exchange OAuth2 code to access/refresh token"
      description: "Title required Authorization: Bearer <token>"
      tags: "Auth"
      security: {
        security_requirement: {key: "BearerAuth"}
      }
    };
  }

  rpc UserDetails(UserDetailsRequest) returns (UserDetailsResponse) {
    option (google.api.http) = {get: "/v1/auth/user"};

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get user information"
      description: "Title required Authorization: Bearer <token>"
      tags: "Auth"
      security: {
        security_requirement: {key: "BearerAuth"}
      }
    };
  }

  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse) {
    option (google.api.http) = {
      post: "/v1/auth/refresh"
      body: "*"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Updating Tokens"
      description: "Title required Authorization: Bearer <token>"
      tags: "Auth"
      security: {
        security_requirement: {key: "BearerAuth"}
      }
    };
  }

  rpc Logout(LogoutRequest) returns (LogoutResponse) {
    option (google.api.http) = {
      post: "/v1/auth/logout"
      body: "*"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "User logout"
      description: "Title required Authorization: Bearer <token>"
      tags: "Auth"
      security: {
        security_requirement: {key: "BearerAuth"}
      }
    };
  }

  rpc RevokeRefreshToken(RevokeRefreshTokenRequest) returns (RevokeRefreshTokenResponse) {
    option (google.api.http) = {
      post: "/v1/auth/revoke"
      body: "*"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Forced Token Refresh Disability"
      description: "Title required Authorization: Bearer <token>"
      tags: "Auth"
      security: {
        security_requirement: {key: "BearerAuth"}
      }
    };
  }

  rpc GetPermissions(GetPermissionsRequest) returns (GetPermissionsResponse) {
    option (google.api.http) = {get: "/v1/auth/permissions"};

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get user permissions list"
      description: "Title required Authorization: Bearer <token>"
      tags: "Auth"
      security: {
        security_requirement: {key: "BearerAuth"}
      }
    };
  }
}

message ExchangeCodeRequest {
  Provider provider = 1;
  string code = 2;
}

message ExchangeCodeResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message UserDetailsRequest {
  string access_token = 1;
}

message UserDetailsResponse {
  string user_id = 1;
  string email = 2;
  string name = 3;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {}

message RevokeRefreshTokenRequest {
  string refresh_token = 1;
}

message RevokeRefreshTokenResponse {}

message Permission {
  string code = 1;
  string description = 2;
}

message GetPermissionsRequest {
  string access_token = 1;
}

message GetPermissionsResponse {
  repeated Permission permissions = 1;
}
