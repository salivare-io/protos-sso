version: "3"

tasks:
  gen:
    desc: Generate all code via Docker
    cmds:
      - docker build -t protos-sso-gen -f DockerfileGenProto .
      - rm -rf gen/ts gen/go gen/openapi

      - docker run --rm -v {{.PWD}}:/workspace protos-sso-gen buf generate --template buf.gen.go.yaml

      - docker run --rm -v {{.PWD}}:/workspace protos-sso-gen buf generate --template buf.gen.ts.yaml --path proto/sso/api

  ts:build-pack:
    desc: Compile TypeScript with tsc and place compiled files into SRC_DIR/.artifacts/INNER_PATH, then npm pack
    dir: .
    env:
      SRC_DIR: "gen/ts/sso/api/auth/v1"      # where generated TS sources live (input)
      TMP_BUILD: ".tmp_build"               # temporary compile output
      TEMPLATE_PATH: "./package.template.json"
      INNER_PATH: "auth/v1"                 # short path inside artifact where compiled files will be placed
    cmds:
      - docker build -t protos-sso-publish -f DockerfilePublish .
      - |
        : "${SRC_DIR:=gen/ts/sso/api/auth/v1}"
        : "${TMP_BUILD:=.tmp_build}"
        : "${TEMPLATE_PATH:=./package.template.json}"
        : "${INNER_PATH:=auth/v1}"

        ARTIFACT_DIR="${SRC_DIR}/.artifacts"
        OUT_TMP="${TMP_BUILD}/out"

        # prepare
        rm -rf "${TMP_BUILD}" || true
        mkdir -p "${OUT_TMP}"
        rm -rf "${ARTIFACT_DIR}" || true
        mkdir -p "${ARTIFACT_DIR}"

        # compile with tsc into TMP_BUILD/out
        # stdout -> tsc.stdout, stderr -> tsc.stderr (removed if empty)
        docker run --rm --entrypoint sh -v {{.PWD}}:/workspace -w /workspace protos-sso-publish -c \
          'set -e; rm -rf /workspace/.tmp_build || true; mkdir -p /workspace/.tmp_build/out; \
           command -v tsc >/dev/null 2>&1 || exit 0; \
           tsc --project /workspace/tsconfig.build.json --outDir /workspace/.tmp_build/out > /workspace/.tmp_build/tsc.stdout 2> /workspace/.tmp_build/tsc.stderr || true; \
           [ -s /workspace/.tmp_build/tsc.stderr ] || rm -f /workspace/.tmp_build/tsc.stderr'

        # determine compiled source path inside OUT_TMP
        # common case: generator produces sso/api/auth/v1 under OUT_TMP
        SRC_REL="sso/api/auth/v1"
        DEST_DIR="${ARTIFACT_DIR}/${INNER_PATH}"

        mkdir -p "${DEST_DIR}"

        if [ -d "${OUT_TMP}/${SRC_REL}" ]; then
          # copy only compiled files from expected path
          cp -r "${OUT_TMP}/${SRC_REL}/." "${DEST_DIR}/" 2>/dev/null || true
        elif [ -d "${OUT_TMP}/${INNER_PATH}" ]; then
          # if tsc wrote directly to out/auth/v1
          cp -r "${OUT_TMP}/${INNER_PATH}/." "${DEST_DIR}/" 2>/dev/null || true
        else
          # fallback: copy all .js and .d.ts preserving relative layout under DEST_DIR
          find "${OUT_TMP}" -type f \( -name '*.js' -o -name '*.d.ts' \) -print0 | while IFS= read -r -d '' f; do
            rel="${f#${OUT_TMP}/}"
            destdir="$(dirname "${DEST_DIR}/${rel}")"
            mkdir -p "${destdir}"
            cp -f "${f}" "${destdir}/" 2>/dev/null || true
          done
        fi

        # copy package template into artifact root (preferred)
        if [ -f "${TEMPLATE_PATH}" ]; then
          cp -f "${TEMPLATE_PATH}" "${ARTIFACT_DIR}/package.json"
        elif [ -f "${SRC_DIR}/package.json" ]; then
          cp -f "${SRC_DIR}/package.json" "${ARTIFACT_DIR}/package.json"
        elif [ -f "./package.json" ]; then
          cp -f "./package.json" "${ARTIFACT_DIR}/package.json"
        else
          SAFE_NAME="$(echo "${SRC_DIR}" | sed 's|/|-|g' | sed 's|^gen-||' | sed 's|[^a-zA-Z0-9._-]|-|g' | tr '[:upper:]' '[:lower:]')"
          printf '%s\n' "{ \"name\": \"${SAFE_NAME}\", \"version\": \"0.0.0\", \"main\": \"${INNER_PATH}/auth_connect.js\", \"types\": \"${INNER_PATH}/auth_pb.d.ts\", \"files\": [\"${INNER_PATH}\"] }" > "${ARTIFACT_DIR}/package.json"
        fi

        # ensure package.json declares runtime dependency @bufbuild/protobuf so consumers install it
        PKG_JSON="${ARTIFACT_DIR}/package.json"
        if [ -f "${PKG_JSON}" ]; then
          if command -v jq >/dev/null 2>&1; then
            jq ' .dependencies += {"@bufbuild/protobuf":"^1.0.0"}' "${PKG_JSON}" > "${PKG_JSON}.tmp" && mv "${PKG_JSON}.tmp" "${PKG_JSON}" || true
          else
            # best-effort insertion without jq
            if ! grep -q '"dependencies"' "${PKG_JSON}" 2>/dev/null; then
              sed -E 's/^( *\})$/  , "dependencies": { "@bufbuild/protobuf": "^1.0.0" }\n\1/' "${PKG_JSON}" > "${PKG_JSON}.tmp" && mv "${PKG_JSON}.tmp" "${PKG_JSON}" || true
            else
              awk 'BEGIN{p=0} /"dependencies"/{print; p=1; next} { if(p && /\}/){ print "    \"@bufbuild/protobuf\": \"^1.0.0\","; p=0 } print }' "${PKG_JSON}" > "${PKG_JSON}.tmp" && mv "${PKG_JSON}.tmp" "${PKG_JSON}" || true
            fi
          fi
        fi

        # ensure ownership so files belong to host user
        HOST_UID="$(id -u)"; HOST_GID="$(id -g)"
        docker run --rm -v {{.PWD}}:/workspace -w /workspace protos-sso-publish \
          sh -c "chown -R ${HOST_UID}:${HOST_GID} /workspace/${ARTIFACT_DIR} || true"

        # pack as host user from artifact dir
        docker run --rm -v {{.PWD}}:/workspace -w /workspace/"${ARTIFACT_DIR}" --user "$(id -u):$(id -g)" protos-sso-publish \
          sh -c "set -e; npm pack --silent || true"

        # cleanup tmp build
        rm -rf "${TMP_BUILD}" || true
    silent: false

  ts:publish:
    desc: Publish generated package to npm using protos-sso-publish. Requires NPM_TOKEN.
    env:
      NPM_TOKEN: ""
      NPM_REGISTRY: "https://registry.npmjs.org/"
      PKG_DIR: "gen/ts/sso/api"
    cmds:
      - docker build -t protos-sso-publish -f DockerfilePublish .
      - |
        : "${PKG_DIR:=gen/ts/sso/api}"
        : "${NPM_REGISTRY:=https://registry.npmjs.org/}"
        # NPM_TOKEN must be provided either via env or task invocation
        if [ -z "${NPM_TOKEN}" ]; then
          echo "ERROR: NPM_TOKEN is required for ts:publish"; exit 2;
        fi
        echo "Publishing from ${PKG_DIR} to ${NPM_REGISTRY}"
      - |
        docker run --rm -v {{.PWD}}:/workspace -w /workspace/${PKG_DIR} \
          -e NPM_TOKEN -e NPM_REGISTRY protos-sso-publish \
          "set -eux;
           pnpm -v;
           pnpm install --frozen-lockfile || true;
           echo \"registry=${NPM_REGISTRY}\" > /root/.npmrc;
           if [ \"${NPM_REGISTRY}\" = \"https://registry.npmjs.org/\" ]; then
             echo \"//registry.npmjs.org/:_authToken=\${NPM_TOKEN}\" >> /root/.npmrc;
           else
             echo \"//\$(echo ${NPM_REGISTRY} | sed -e 's#^https\?://##'):_authToken=\${NPM_TOKEN}\" >> /root/.npmrc || true;
           fi
           pnpm publish --registry ${NPM_REGISTRY} --access public --no-git-checks
          "
    silent: false

  gen-build-publish:
    desc: Run gen -> ts:pack -> ts:publish by calling existing tasks. Pass PKG_DIR and NPM_TOKEN via env.
    env:
      NPM_TOKEN: ""
      NPM_REGISTRY: "https://registry.npmjs.org/"
      PKG_DIR: "gen/ts/sso/api"
    cmds:
      - |
        : "${PKG_DIR:=gen/ts/sso/api}"
        : "${NPM_REGISTRY:=https://registry.npmjs.org/}"
        echo "publish-all: PKG_DIR=${PKG_DIR} NPM_REGISTRY=${NPM_REGISTRY}"
        if [ -z "${NPM_TOKEN}" ]; then
          echo "WARNING: NPM_TOKEN not set. ts:publish will fail if token is required."
        fi
      - task gen
      - task ts:pack
      - task ts:publish
    silent: false

  lint:
    cmds:
      - buf lint proto

  deps:
    cmds:
      - buf mod update proto

  help:
    desc: Show usage for all tasks
    cmds:
      - |
        cat <<'EOF'
        Tasks:
          - gen: Generate code (go, ts, openapi) via Docker.
          - ts:build-pack: Build TypeScript, copy package.template.json into ARTIFACT_DIR and create npm package (.tgz).
          - ts:publish: Publish generated package to npm (requires NPM_TOKEN).
          - gen-build-publish: Run gen -> ts:build-pack -> ts:publish (convenience wrapper).
          - lint: Run buf lint on proto.
          - deps: Run buf mod update on proto.

        Usage examples:
          # generate code
          task gen

          # build and pack a specific package
          PKG_DIR=gen/ts/sso/api/auth/v1 task -f ts:build-pack

          # publish (requires NPM_TOKEN)
          NPM_TOKEN=xxx PKG_DIR=gen/ts/sso/api task -f ts:publish

          # full flow: generate, build/pack, publish
          NPM_TOKEN=xxx PKG_DIR=gen/ts/sso/api task -f gen-build-publish

        Important variables:
          - PKG_DIR: directory with generated TS package (default: gen/ts/sso/api)
          - ARTIFACT_DIR: computed as ${PKG_DIR}/.artifacts inside tasks
          - TEMPLATE_PATH: path to package template (default: ./package.template.json)
          - NPM_TOKEN: required for ts:publish
          - NPM_REGISTRY: npm registry URL (default: https://registry.npmjs.org/)

        Notes and troubleshooting:
          - Ensure your package template (TEMPLATE_PATH) contains correct "main" and "types" paths
            relative to the files placed into ${ARTIFACT_DIR}.
          - Common failure: typo in artifact path ('.artrifacts' vs '.artifacts'). Use ARTIFACT_DIR consistently.
          - ts:publish requires a valid NPM_TOKEN. In CI, inject it via secrets.
          - If pnpm reports "No package.json found", check that ${ARTIFACT_DIR}/package.json exists and is readable.
          - For deterministic builds, keep package.template.json in the repo (e.g., pnpm/ssov1/package.template.json)
            and set TEMPLATE_PATH accordingly.

        EOF
