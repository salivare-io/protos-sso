version: v2
managed:
  enabled: true
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen/go
  - remote: buf.build/connectrpc/go
    out: gen/go
  - remote: buf.build/grpc-ecosystem/openapiv2
    out: gen/openapi/sso
    opt:
      - allow_merge=true
      - merge_file_name=sso_auth
inputs:
  - directory: proto
