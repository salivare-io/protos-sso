version: v2
managed:
  enabled: true
plugins:
  - remote: buf.build/bufbuild/es
    out: gen/ts
    opt:
      - target=ts
  - remote: buf.build/connectrpc/es
    out: gen/ts
    opt:
      - target=ts
  - remote: buf.build/grpc-ecosystem/openapiv2
    out: gen/openapi/api
    opt:
      - allow_merge=true
      - merge_file_name=api_auth
inputs:
  - directory: proto
